services:
  - type: web
    name: crosslog-whatsapp-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WA_TOKEN
        sync: false
      - key: WA_PHONE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: USUARIOS_AUTORIZADOS
        sync: false
